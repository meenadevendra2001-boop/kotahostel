<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hostel Details</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:700px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:#ff6b00;
color:white;
border:none;
border-radius:8px;
font-size:18px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<img id="image">

<h2 id="name"></h2>

<p><b>Location:</b> <span id="location"></span></p>

<p><b>Price:</b> ₹<span id="price"></span>/month</p>

<p><b>WiFi:</b> <span id="wifi"></span></p>

<p><b>Food:</b> <span id="food"></span></p>

<p><b>AC:</b> <span id="ac"></span></p>

<button>Book Now</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="script.js"></script>
<script>
window.onload = function () {
    loadHostelDetails();
};
</script>
</body>
</html>
