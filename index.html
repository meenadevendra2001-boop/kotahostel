<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HostelHub Kota</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#ff6600;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

button{
    background:#ff6600;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.auth-box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.auth-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}
</style>

</head>
<body>

<header>
HostelHub Kota
</header>

<div class="hero">
<h2>Find Your Perfect Hostel
  </h2>
<p>Search • Compare • Book</p>
<button>Search Hostel</button>
</div>

<div class="card">
<h3>Sample Hostel</h3>
<p>₹7000/month</p>
<p>WiFi • Food • AC</p>
</div>

<div class="auth-box">
<h2>Login / Register</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<p id="message"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
                                                                                  </html>
